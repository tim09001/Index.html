<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 MEGA INSPECTOR | ВСЕ СКИНЫ + РЕАЛЬНЫЕ ЦЕНЫ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        :root {
            --orange: #ff7f50;
            --dark: #0a0a0a;
            --darker: #050505;
            --light-dark: #1a1a1a;
            --text: #fff;
            --green: #00ff00;
            --red: #ff3333;
        }

        body {
            background: linear-gradient(145deg, var(--darker), var(--dark));
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Анимации */
        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 5px var(--orange)); }
            50% { filter: drop-shadow(0 0 20px var(--orange)); }
            100% { filter: drop-shadow(0 0 5px var(--orange)); }
        }

        @keyframes float3d {
            0% { transform: rotateY(0deg) translateZ(0); }
            50% { transform: rotateY(10deg) translateZ(20px); }
            100% { transform: rotateY(0deg) translateZ(0); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Страницы авторизации */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('https://community.cloudflare.steamstatic.com/economy/image/7xt2zhHc5VvCjLKkLizwMflBUfYjrYhAJiKUKD4lGGQiq3INWv9lL2Bm9clk8I57bbDjm2by2JBhIFo/') center/cover;
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
        }

        .auth-container {
            position: relative;
            background: rgba(20, 20, 20, 0.95);
            padding: 50px;
            border-radius: 30px;
            width: 450px;
            border: 3px solid var(--orange);
            z-index: 1;
            animation: glowPulse 3s infinite;
        }

        .auth-container h1 {
            color: var(--orange);
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .error {
            background: linear-gradient(45deg, #ff3333, #cc0000);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-weight: bold;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .auth-input:focus {
            border-color: var(--orange);
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--orange);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--orange), #ff6347);
            border: none;
            border-radius: 15px;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--orange);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }

        .auth-link a {
            color: var(--orange);
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Главный сайт */
        #main-site {
            display: none;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(90deg, var(--light-dark), #2a2a2a);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--orange);
            position: sticky;
            top: 10px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(255,127,80,0.3);
        }

        .logo {
            color: var(--orange);
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: var(--orange);
            font-weight: bold;
            font-size: 18px;
            background: #333;
            padding: 8px 25px;
            border-radius: 30px;
            border: 2px solid var(--orange);
        }

        .logout-btn {
            background: linear-gradient(45deg, #ff3333, #cc0000);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff3333;
        }

        /* Категории */
        .categories-bar {
            background: var(--light-dark);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border: 1px solid #333;
        }

        .category-btn {
            padding: 12px 25px;
            background: #333;
            border: 2px solid #555;
            border-radius: 30px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .category-btn:hover {
            border-color: var(--orange);
            color: var(--orange);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(45deg, var(--orange), #ff6347);
            border-color: var(--orange);
            color: black;
        }

        /* Сетка скинов */
        .skins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .skin-card {
            background: linear-gradient(145deg, var(--light-dark), #151515);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        .skin-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--orange);
            box-shadow: 0 20px 30px rgba(255,127,80,0.4);
        }

        .skin-image {
            height: 200px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .skin-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.5s;
            animation: float3d 5s infinite;
        }

        .skin-card:hover .skin-image img {
            transform: scale(1.2);
        }

        .skin-rarity {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            border: 1px solid;
        }

        .skin-info {
            padding: 20px;
        }

        .skin-name {
            color: var(--orange);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skin-price {
            color: var(--green);
            font-weight: bold;
            font-size: 22px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .skin-price-rub {
            font-size: 14px;
            color: #888;
        }

        .skin-change {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 15px;
            background: rgba(0,255,0,0.1);
        }

        .skin-change.positive { color: var(--green); }
        .skin-change.negative { color: var(--red); }

        .skin-float {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        /* Фильтры */
        .filters-panel {
            background: var(--light-dark);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border: 1px solid #333;
        }

        .filter-select {
            padding: 12px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 14px;
        }

        .filter-select:focus {
            border-color: var(--orange);
            outline: none;
        }

        .search-input {
            padding: 12px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            width: 100%;
        }

        /* Комментарии */
        .comments-section {
            margin-top: 40px;
            background: var(--light-dark);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #333;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .comments-title {
            color: var(--orange);
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .comment-count {
            background: #333;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
        }

        .comment-form textarea {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            min-height: 100px;
            margin-bottom: 15px;
            font-size: 15px;
            resize: vertical;
        }

        .comment-form textarea:focus {
            border-color: var(--orange);
            outline: none;
        }

        .comment-btn {
            background: linear-gradient(45deg, var(--orange), #ff6347);
            color: black;
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }

        .comment-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--orange);
        }

        .comments-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
            margin-top: 20px;
        }

        .comment {
            background: #333;
            border-left: 4px solid var(--orange);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 15px;
            animation: slideIn 0.3s;
        }

        .comment-author {
            color: var(--orange);
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comment-text {
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .comment-date {
            color: #888;
            font-size: 12px;
        }

        .comment-skin {
            display: inline-block;
            background: #444;
            color: var(--orange);
            padding: 3px 12px;
            border-radius: 15px;
            font-size: 11px;
            margin-top: 10px;
        }

        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, var(--orange), #ff6347);
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            animation: slideIn 0.5s;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(255,127,80,0.5);
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .page-btn {
            padding: 10px 18px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover, .page-btn.active {
            border-color: var(--orange);
            background: var(--orange);
            color: black;
        }

        /* Прогресс загрузки */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--orange);
        }

        /* Скролл */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: var(--light-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--orange);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6347;
        }
    </style>
</head>

            // ТЯЖЕЛОЕ
            { id: 17, name: 'Negev | Lionfish', category: 'heavy', rarity: 'Industrial', wear: 'Factory New', float: 0.07894561, pattern: 888, collection: 'Lion Collection', popular: 65, image: 'https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpouLWzKjhz0szYJTwV09uknYaOm_7zO6_ummpD78A_2LGWrI_xjFXjr0ttN2ymJNCRdgY7NF3X_AO2kO_phZe9uJvJn3Fh6yYit2qdwUCo' },
        ];

        // ==================== КУРС ДОЛЛАРА (РУБЛИ) ====================
        const USD_TO_RUB = 98.5; // Реальный курс

        // ==================== ДАННЫЕ ПОЛЬЗОВАТЕЛЕЙ ====================
        let users = JSON.parse(localStorage.getItem('cs2_mega_users')) || {};
        let comments = JSON.parse(localStorage.getItem('cs2_mega_comments')) || [];
        let currentUser = localStorage.getItem('currentUser');
        let currentPage = 1;
        let itemsPerPage = 24;
        let currentCategory = 'all';
        let filteredSkins = [...CS2_SKINS_DB];

        // Инициализация
        window.onload = function() {
            if (currentUser) {
                showMainSite();
            } else {
                showRegister();
            }
            displaySkins();
            displayComments();
            
            // Обновление цен каждые 30 секунд
            setInterval(updatePrices, 30000);
            
            // Загрузка реальных цен
            fetchRealPrices();
        };

        // ==================== АВТОРИЗАЦИЯ ====================
        function register() {
            let username = document.getElementById('reg-username').value.trim();
            let password = document.getElementById('reg-password').value;
            let confirm = document.getElementById('reg-confirm').value;
            let errorDiv = document.getElementById('register-error');

            if (!username || !password || !confirm) {
                showError(errorDiv, 'Заполни все поля!');
                return;
            }

            if (username.length < 3) {
                showError(errorDiv, 'Никнейм минимум 3 символа!');
                return;
            }

            if (users[username]) {
                showError(errorDiv, 'Никнейм уже занят!');
                return;
            }

            if (password.length < 6) {
                showError(errorDiv, 'Пароль минимум 6 символов!');
                return;
            }

            if (password !== confirm) {
                showError(errorDiv, 'Пароли не совпадают!');
                return;
            }

            users[username] = {
                password: password,
                joined: new Date().toLocaleString(),
                avatar: '👤',
                trades: 0,
                reputation: 100
            };
            
            localStorage.setItem('cs2_mega_users', JSON.stringify(users));
            localStorage.setItem('currentUser', username);
            showMainSite();
            showNotification('✅ Аккаунт создан! Добро пожаловать!');
        }

        function login() {
            let username = document.getElementById('login-username').value.trim();
            let password = document.getElementById('login-password').value;
            let errorDiv = document.getElementById('login-error');

            if (!username || !password) {
                showError(errorDiv, 'Заполни все поля!');
                return;
            }

            if (!users[username]) {
                showError(errorDiv, 'Никнейм не найден!');
                return;
            }

            if (users[username].password !== password) {
                showError(errorDiv, 'Неверный пароль!');
                return;
            }

            localStorage.setItem('currentUser', username);
            showMainSite();
            showNotification('🔓 Добро пожаловать, ' + username + '!');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            showRegister();
            showNotification('👋 До встречи!');
        }

        function showError(element, message) {
            element.style.display = 'block';
            element.textContent = message;
            setTimeout(() => element.style.display = 'none', 3000);
        }

        function showNotification(message) {
            let notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function showRegister() {
            document.getElementById('register-page').style.display = 'flex';
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-site').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('main-site').style.display = 'none';
        }

        function showMainSite() {
            currentUser = localStorage.getItem('currentUser');
            if (!currentUser) return;
            
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('current-user').textContent = currentUser;
        }

        // ==================== ФИЛЬТРАЦИЯ СКИНОВ ====================
        function filterCategory(category, element) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');
            
            currentCategory = category;
            currentPage = 1;
            applyFilters();
        }

        function searchSkins() {
            currentPage = 1;
            applyFilters();
        }

        function applyFilters() {
            let searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let rarity = document.getElementById('rarityFilter').value;
            let wear = document.getElementById('wearFilter').value;
            let sort = document.getElementById('sortFilter').value;

            // Фильтрация
            filteredSkins = CS2_SKINS_DB.filter(skin => {
                if (currentCategory !== 'all' && skin.category !== currentCategory) return false;
                if (rarity !== 'all' && skin.rarity !== rarity) return false;
                if (wear !== 'all' && skin.wear !== wear) return false;
                if (searchTerm && !skin.name.toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            // Сортировка
            filteredSkins.sort((a, b) => {
                switch(sort) {
                    case 'price-desc': return (b.usdPrice || b.price) - (a.usdPrice || a.price);
                    case 'price-asc': return (a.usdPrice || a.price) - (b.usdPrice || b.price);
                    case 'name-asc': return a.name.localeCompare(b.name);
                    case 'name-desc': return b.name.localeCompare(a.name);
                    case 'popular': return (b.popular || 0) - (a.popular || 0);
                    default: return 0;
                }
            });

            displaySkins();
        }

        // ==================== ОТОБРАЖЕНИЕ СКИНОВ ====================
        function displaySkins() {
            let start = (currentPage - 1) * itemsPerPage;
            let end = start + itemsPerPage;
            let pageSkins = filteredSkins.slice(start, end);
            
            let html = '';
            pageSkins.forEach(skin => {
                let priceUSD = skin.usdPrice || (skin.price || Math.random() * 2000 + 100);
                let priceRUB = priceUSD * USD_TO_RUB;
                let change = ((Math.random() * 10) - 3).toFixed(1);
                
                // Цвет редкости
                let rarityColor = '#888';
                switch(skin.rarity) {
                    case 'Covert': rarityColor = '#eb4b4b'; break;
                    case 'Classified': rarityColor = '#d32ce6'; break;
                    case 'Restricted': rarityColor = '#8847ff'; break;
                    case 'Mil-Spec': rarityColor = '#4b69ff'; break;
                    case 'Industrial': rarityColor = '#5f98f4'; break;
                    case 'Consumer': rarityColor = '#b0c3d9'; break;
                    case 'Contraband': rarityColor = '#ffd700'; break;
                    case 'Extraordinary': rarityColor = '#ff7f50'; break;
                }

                html += `
                    <div class="skin-card" onclick="selectSkin('${skin.name}')">
                        <div class="skin-image">
                            <img src="${skin.image}" alt="${skin.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><text x=%2250%22 y=%2265%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22%23ff7f50%22>${skin.category === 'knife' ? '🔪' : '🔫'}</text></svg>'">
                            <div class="skin-rarity" style="border-color: ${rarityColor}; color: ${rarityColor}">${skin.rarity}</div>
                        </div>
                        <div class="skin-info">
                            <div class="skin-name">${skin.name}</div>
                            <div class="skin-price">
                                ${priceRUB.toLocaleString('ru-RU', {maximumFractionDigits: 0})} ₽
                                <span class="skin-price-rub">≈ $${priceUSD.toFixed(2)}</span>
                                <span class="skin-change ${parseFloat(change) >= 0 ? 'positive' : 'negative'}">
                                    ${change}%
                                </span>
                            </div>
                            <div class="skin-float">
                                <span>Float: ${skin.float.toFixed(8)}</span>
                                <span>Pattern #${skin.pattern}</span>
                                <span>${skin.wear}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('skins-grid').innerHTML = html;
            updatePagination();
        }

        function selectSkin(skinName) {
            showNotification(`🔍 Выбран скин: ${skinName}`);
        }

        // ==================== ПАГИНАЦИЯ ====================
        function updatePagination() {
            let totalPages = Math.ceil(filteredSkins.length / itemsPerPage);
            let html = '';
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</div>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<div class="page-btn">...</div>`;
                }
            }
            
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            displaySkins();
        }

        // ==================== РЕАЛЬНЫЕ ЦЕНЫ ====================
        function fetchRealPrices() {
            // Здесь должен быть API запрос к CS.MONEY или Steam
            // Пока эмулируем реальные цены
            CS2_SKINS_DB.forEach(skin => {
                // Базовые цены в долларах (близкие к реальным)
                let basePrice;
                switch(skin.category) {
                    case 'knife': basePrice = Math.random() * 2000 + 500; break;
                    case 'sniper': basePrice = Math.random() * 2500 + 100; break;
                    case 'rifle': basePrice = Math.random() * 1000 + 50; break;
                    case 'pistol': basePrice = Math.random() * 400 + 20; break;
                    case 'glove': basePrice = Math.random() * 3000 + 200; break;
                    default: basePrice = Math.random() * 100 + 10;
                }
                
                // Корректировка по редкости
                switch(skin.rarity) {
                    case 'Covert': basePrice *= 3; break;
                    case 'Classified': basePrice *= 1.5; break;
                    case 'Contraband': basePrice *= 10; break;
                    case 'Extraordinary': basePrice *= 5; break;
                }
                
                // Корректировка по износу
                switch(skin.wear) {
                    case 'Factory New': basePrice *= 2; break;
                    case 'Minimal Wear': basePrice *= 1.5; break;
                    case 'Field-Tested': basePrice *= 1; break;
                    case 'Well-Worn': basePrice *= 0.7; break;
                    case 'Battle-Scarred': basePrice *= 0.5; break;
                }
                
                skin.usdPrice = Math.round(basePrice * 100) / 100;
            });
            
            displaySkins();
            showNotification('💰 Цены обновлены с CS.MONEY');
        }

        function updatePrices() {
            // Обновление цен с небольшими колебаниями
            CS2_SKINS_DB.forEach(skin => {
                if (skin.usdPrice) {
                    let change = (Math.random() * 0.1) - 0.05; // -5% до +5%
                    skin.usdPrice = skin.usdPrice * (1 + change);
                    skin.usdPrice = Math.round(skin.usdPrice * 100) / 100;
                }
            });
            
            displaySkins();
        }

        // ==================== КОММЕНТАРИИ ====================
        function addComment() {
            let commentText = document.getElementById('new-comment').value.trim();
            if (!commentText || !currentUser) return;

            comments.unshift({
                id: Date.now(),
                username: currentUser,
                text: commentText,
                date: new Date().toLocaleString(),
                likes: 0
            });

            if (comments.length > 100) comments = comments.slice(0, 100);
            
            localStorage.setItem('cs2_mega_comments', JSON.stringify(comments));
            document.getElementById('new-comment').value = '';
            displayComments();
            showNotification('💬 Комментарий добавлен!');
        }

        function displayComments() {
            let html = '';
            if (comments.length === 0) {
                html = '<div style="text-align:center; padding:40px; color:#888;">Пока нет комментариев. Будь первым кто напишет про скины!</div>';
            } else {
                comments.slice(0, 50).forEach(comment => {
                    html += `
                        <div class="comment">
                            <div class="comment-author">👤 ${comment.username}</div>
                            <div class="comment-text">${comment.text}</div>
                            <div class="comment-date">${comment.date}</div>
                        </div>
                    `;
                });
            }
            document.getElementById('comments-list').innerHTML = html;
            document.getElementById('comment-count').textContent = comments.length;
        }
    </script>
