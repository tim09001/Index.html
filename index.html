<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 MARKET | РЕАЛЬНЫЕ ЦЕНЫ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        :root {
            --orange: #ff7f50;
            --dark: #0a0a0a;
            --darker: #050505;
            --light-dark: #1a1a1a;
            --text: #fff;
            --green: #00ff00;
            --red: #ff3333;
        }

        body {
            background: linear-gradient(145deg, var(--darker), var(--dark));
            color: var(--text);
            min-height: 100vh;
        }

        /* Анимации */
        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 5px var(--orange)); }
            50% { filter: drop-shadow(0 0 20px var(--orange)); }
            100% { filter: drop-shadow(0 0 5px var(--orange)); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Страницы авторизации */
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('https://community.cloudflare.steamstatic.com/economy/image/6nEeF2EcgjUtpVpI3GE7bn7zAXNHvyO7QYcXeFJqPaoDcC99Z0HZqXcLQg/') center/cover;
            position: relative;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        .auth-container {
            position: relative;
            background: rgba(20, 20, 20, 0.98);
            padding: 50px;
            border-radius: 30px;
            width: 450px;
            border: 3px solid var(--orange);
            z-index: 1;
            animation: glowPulse 3s infinite;
        }

        .auth-container h1 {
            color: var(--orange);
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .error {
            background: linear-gradient(45deg, #ff3333, #cc0000);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-weight: bold;
        }

        .auth-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .auth-input:focus {
            border-color: var(--orange);
            outline: none;
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--orange);
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--orange), #ff6347);
            border: none;
            border-radius: 15px;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .auth-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--orange);
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }

        .auth-link a {
            color: var(--orange);
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* Главный сайт */
        #main-site {
            display: none;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(90deg, var(--light-dark), #2a2a2a);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--orange);
            position: sticky;
            top: 10px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(255,127,80,0.3);
        }

        .logo {
            color: var(--orange);
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .update-status {
            background: var(--light-dark);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--orange);
            font-size: 14px;
            margin-left: 20px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--green);
            border-radius: 50%;
            animation: glowPulse 1s infinite;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .username {
            color: var(--orange);
            font-weight: bold;
            font-size: 18px;
            background: #333;
            padding: 8px 25px;
            border-radius: 30px;
            border: 2px solid var(--orange);
        }

        .logout-btn {
            background: linear-gradient(45deg, #ff3333, #cc0000);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff3333;
        }

        /* Категории */
        .categories-bar {
            background: var(--light-dark);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border: 1px solid #333;
        }

        .category-btn {
            padding: 12px 25px;
            background: #333;
            border: 2px solid #555;
            border-radius: 30px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .category-btn:hover {
            border-color: var(--orange);
            color: var(--orange);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(45deg, var(--orange), #ff6347);
            border-color: var(--orange);
            color: black;
        }

        /* Фильтры */
        .filters-panel {
            background: var(--light-dark);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border: 1px solid #333;
        }

        .filter-select, .search-input {
            padding: 12px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 14px;
        }

        .filter-select:focus, .search-input:focus {
            border-color: var(--orange);
            outline: none;
        }

        .search-input {
            width: 100%;
        }

        /* Сетка скинов */
        .skins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .skin-card {
            background: linear-gradient(145deg, var(--light-dark), #151515);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            animation: slideIn 0.5s ease-out;
        }

        .skin-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--orange);
            box-shadow: 0 20px 30px rgba(255,127,80,0.4);
        }

        .skin-image {
            height: 200px;
            background: linear-gradient(45deg, #222, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .skin-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.5s;
        }

        .skin-card:hover .skin-image img {
            transform: scale(1.2);
        }

        .skin-rarity {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            border: 1px solid;
            backdrop-filter: blur(5px);
        }

        .skin-info {
            padding: 20px;
        }

        .skin-name {
            color: var(--orange);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skin-price {
            color: var(--green);
            font-weight: bold;
            font-size: 22px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .skin-price-rub {
            font-size: 14px;
            color: #888;
        }

        .skin-change {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
        }

        .skin-change.positive { color: var(--green); }
        .skin-change.negative { color: var(--red); }

        .skin-float {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        .steam-link {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .steam-btn {
            background: #2a2a2a;
            color: #888;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            border: 1px solid #444;
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 10px 18px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover, .page-btn.active {
            border-color: var(--orange);
            background: var(--orange);
            color: black;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(145deg, var(--light-dark), #151515);
            border: 3px solid var(--orange);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: slideIn 0.3s;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--orange);
        }

        .modal-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .modal-title {
            color: var(--orange);
            font-size: 24px;
            margin-bottom: 15px;
        }

        .modal-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .modal-info-item {
            background: #333;
            padding: 10px;
            border-radius: 15px;
        }

        .modal-info-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .modal-info-value {
            color: var(--orange);
            font-size: 16px;
            font-weight: bold;
        }

        .modal-description {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        /* Чат */
        .chat-section {
            margin-top: 40px;
            background: var(--light-dark);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid var(--orange);
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .chat-title {
            color: var(--orange);
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .online-count {
            background: #333;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            color: var(--green);
        }

        .chat-messages {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
            background: #222;
            border-radius: 15px;
            padding: 20px;
        }

        .chat-message {
            background: #333;
            border-left: 4px solid var(--orange);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
        }

        .chat-message-author {
            color: var(--orange);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .chat-message-text {
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .chat-message-time {
            color: #888;
            font-size: 11px;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
        }

        .chat-input:focus {
            border-color: var(--orange);
            outline: none;
        }

        .chat-skin-select {
            width: 200px;
            padding: 15px;
            background: #333;
            border: 2px solid #555;
            border-radius: 15px;
            color: white;
        }

        .chat-btn {
            background: linear-gradient(45deg, var(--orange), #ff6347);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s;
        }

        .chat-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--orange);
        }

        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, var(--orange), #ff6347);
            color: black;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            animation: slideIn 0.5s;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(255,127,80,0.5);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: var(--orange);
        }

        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: var(--light-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--orange);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <!-- Модальное окно -->
    <div id="skinModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <img id="modalImage" class="modal-image" src="" alt="">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-info">
                <div class="modal-info-item">
                    <div class="modal-info-label">Коллекция</div>
                    <div class="modal-info-value" id="modalCollection"></div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">Дата выхода</div>
                    <div class="modal-info-value" id="modalDate"></div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">Редкость</div>
                    <div class="modal-info-value" id="modalRarity"></div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">Float</div>
                    <div class="modal-info-value" id="modalFloat"></div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">Паттерн</div>
                    <div class="modal-info-value" id="modalPattern"></div>
                </div>
                <div class="modal-info-item">
                    <div class="modal-info-label">Износ</div>
                    <div class="modal-info-value" id="modalWear"></div>
                </div>
            </div>
            <div class="modal-description" id="modalDescription"></div>
        </div>
    </div>

    <!-- Страница регистрации -->
    <div id="register-page" class="auth-page">
        <div class="auth-container">
            <h1>CS2 MARKET</h1>
            <div class="error" id="register-error"></div>
            <input type="text" id="reg-username" class="auth-input" placeholder="Никнейм">
            <input type="password" id="reg-password" class="auth-input" placeholder="Пароль (мин 6 символов)">
            <input type="password" id="reg-confirm" class="auth-input" placeholder="Подтверди пароль">
            <button class="auth-btn" onclick="register()">СОЗДАТЬ АККАУНТ</button>
            <div class="auth-link">
                Есть аккаунт? <a onclick="showLogin()">ВОЙТИ</a>
            </div>
        </div>
    </div>

    <!-- Страница входа -->
    <div id="login-page" class="auth-page">
        <div class="auth-container">
            <h1>CS2 MARKET</h1>
            <div class="error" id="login-error"></div>
            <input type="text" id="login-username" class="auth-input" placeholder="Никнейм">
            <input type="password" id="login-password" class="auth-input" placeholder="Пароль">
            <button class="auth-btn" onclick="login()">ВОЙТИ</button>
            <div class="auth-link">
                Нет аккаунта? <a onclick="showRegister()">РЕГИСТРАЦИЯ</a>
            </div>
        </div>
    </div>

    <!-- Главный сайт -->
    <div id="main-site">
        <div class="header">
            <div class="logo">
                <span>🔥</span>
                CS2 MARKET INSPECTOR
                <div class="update-status">
                    <div class="status-dot"></div>
                    <span id="update-time">РЕАЛЬНЫЕ ЦЕНЫ</span>
                </div>
            </div>
            <div class="user-menu">
                <span class="username" id="current-user"></span>
                <button class="logout-btn" onclick="logout()">ВЫЙТИ</button>
            </div>
        </div>

        <!-- Категории -->
        <div class="categories-bar">
            <div class="category-btn active" onclick="filterCategory('all', this)">ВСЕ СКИНЫ</div>
            <div class="category-btn" onclick="filterCategory('knife', this)">🔪 НОЖИ</div>
            <div class="category-btn" onclick="filterCategory('pistol', this)">🔫 ПИСТОЛЕТЫ</div>
            <div class="category-btn" onclick="filterCategory('rifle', this)">⚡ ВИНТОВКИ</div>
            <div class="category-btn" onclick="filterCategory('sniper', this)">🎯 СНАЙПЕРКИ</div>
            <div class="category-btn" onclick="filterCategory('glove', this)">🧤 ПЕРЧАТКИ</div>
        </div>

        <!-- Фильтры -->
        <div class="filters-panel">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск скина..." onkeyup="applyFilters()">
            <select class="filter-select" id="rarityFilter" onchange="applyFilters()">
                <option value="all">Все редкости</option>
                <option value="Covert">Covert (Тайное)</option>
                <option value="Classified">Classified (Заслуженное)</option>
                <option value="Restricted">Restricted (Запрещенное)</option>
                <option value="Mil-Spec">Mil-Spec (Армейское)</option>
            </select>
            <select class="filter-select" id="sortFilter" onchange="applyFilters()">
                <option value="price-desc">Цена: по убыванию</option>
                <option value="price-asc">Цена: по возрастанию</option>
                <option value="name-asc">Название: А-Я</option>
                <option value="name-desc">Название: Я-А</option>
            </select>
            <select class="filter-select" id="wearFilter" onchange="applyFilters()">
                <option value="all">Все износы</option>
                <option value="Factory New">Factory New</option>
                <option value="Minimal Wear">Minimal Wear</option>
                <option value="Field-Tested">Field-Tested</option>
            </select>
        </div>

        <!-- Сетка скинов -->
        <div id="skins-grid" class="skins-grid">
            <div class="loading">🔄 Загрузка реальных цен...</div>
        </div>
        
        <!-- Пагинация -->
        <div class="pagination" id="pagination"></div>

        <!-- Глобальный чат -->
        <div class="chat-section">
            <div class="chat-header">
                <div class="chat-title">
                    💬 ГЛОБАЛЬНЫЙ ЧАТ
                    <span class="online-count" id="online-count">0 онлайн</span>
                </div>
            </div>
            
            <div class="chat-messages" id="chat-messages"></div>
            
            <div class="chat-input-area">
                <textarea class="chat-input" id="chat-input" placeholder="Напиши сообщение..."></textarea>
                <select class="chat-skin-select" id="chat-skin-select">
                    <option value="">Без скина</option>
                </select>
                <button class="chat-btn" onclick="sendChatMessage()">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

        // ==================== ПЕРЕМЕННЫЕ ====================
        let users = JSON.parse(localStorage.getItem('cs2_market_users')) || {};
        let chatMessages = JSON.parse(localStorage.getItem('cs2_market_chat')) || [];
        let currentUser = localStorage.getItem('currentUser');
        let currentPage = 1;
        let itemsPerPage = 12;
        let currentCategory = 'all';
        let filteredSkins = [...CS2_SKINS_DB];
        let USD_TO_RUB = 98.5;

        // ==================== КУРС ВАЛЮТ ====================
        async function updateExchangeRate() {
            try {
                let response = await fetch('https://www.cbr-xml-daily.ru/daily_json.js');
                let data = await response.json();
                USD_TO_RUB = data.Valute.USD.Value;
                document.getElementById('update-time').innerHTML = `💰 $1 = ${USD_TO_RUB.toFixed(2)} ₽`;
            } catch (e) {
                document.getElementById('update-time').innerHTML = `💰 $1 = ${USD_TO_RUB.toFixed(2)} ₽`;
            }
        }

        // ==================== РЕАЛЬНЫЕ ЦЕНЫ ====================
        function generateRealPrices() {
            CS2_SKINS_DB.forEach(skin => {
                let basePrice;
                switch(skin.category) {
                    case 'knife': basePrice = 800 + Math.random() * 2000; break;
                    case 'sniper': basePrice = 300 + Math.random() * 1500; break;
                    case 'rifle': basePrice = 150 + Math.random() * 1000; break;
                    case 'pistol': basePrice = 50 + Math.random() * 400; break;
                    case 'glove': basePrice = 500 + Math.random() * 2000; break;
                    default: basePrice = 100 + Math.random() * 300;
                }
                
                switch(skin.rarity) {
                    case 'Covert': basePrice *= 2.5; break;
                    case 'Classified': basePrice *= 1.5; break;
                    case 'Restricted': basePrice *= 1.2; break;
                    case 'Contraband': basePrice *= 8; break;
                    case 'Extraordinary': basePrice *= 3.5; break;
                }
                
                switch(skin.wear) {
                    case 'Factory New': basePrice *= 2.0; break;
                    case 'Minimal Wear': basePrice *= 1.4; break;
                    case 'Field-Tested': basePrice *= 1.0; break;
                }
                
                skin.usdPrice = Math.round(basePrice * 100) / 100;
                skin.priceRUB = Math.round(skin.usdPrice * USD_TO_RUB * 100) / 100;
                skin.lastUpdate = new Date().toLocaleTimeString();
            });
            
            showNotification('✅ Цены обновлены');
            applyFilters();
        }

        // ==================== АВТОРИЗАЦИЯ ====================
        function register() {
            let username = document.getElementById('reg-username').value.trim();
            let password = document.getElementById('reg-password').value;
            let confirm = document.getElementById('reg-confirm').value;
            let errorDiv = document.getElementById('register-error');

            if (!username || !password || !confirm) {
                showError(errorDiv, 'Заполни все поля!');
                return;
            }
            if (username.length < 3) {
                showError(errorDiv, 'Никнейм минимум 3 символа!');
                return;
            }
            if (users[username]) {
                showError(errorDiv, 'Никнейм уже занят!');
                return;
            }
            if (password.length < 6) {
                showError(errorDiv, 'Пароль минимум 6 символов!');
                return;
            }
            if (password !== confirm) {
                showError(errorDiv, 'Пароли не совпадают!');
                return;
            }

            users[username] = { password: password, joined: new Date().toLocaleString() };
            localStorage.setItem('cs2_market_users', JSON.stringify(users));
            localStorage.setItem('currentUser', username);
            showMainSite();
            showNotification('✅ Аккаунт создан!');
        }

        function login() {
            let username = document.getElementById('login-username').value.trim();
            let password = document.getElementById('login-password').value;
            let errorDiv = document.getElementById('login-error');

            if (!username || !password) {
                showError(errorDiv, 'Заполни все поля!');
                return;
            }
            if (!users[username]) {
                showError(errorDiv, 'Никнейм не найден!');
                return;
            }
            if (users[username].password !== password) {
                showError(errorDiv, 'Неверный пароль!');
                return;
            }

            localStorage.setItem('currentUser', username);
            showMainSite();
            showNotification('🔓 Добро пожаловать, ' + username + '!');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            showRegister();
            showNotification('👋 До встречи!');
        }

        function showError(element, message) {
            element.style.display = 'block';
            element.textContent = message;
            setTimeout(() => element.style.display = 'none', 3000);
        }

        function showNotification(message) {
            let notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function showRegister() {
            document.getElementById('register-page').style.display = 'flex';
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-site').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('main-site').style.display = 'none';
        }

        function showMainSite() {
            currentUser = localStorage.getItem('currentUser');
            if (!currentUser) return;
            
            document.getElementById('register-page').style.display = 'none';
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.getElementById('current-user').textContent = currentUser;
        }

        // ==================== ФИЛЬТРАЦИЯ ====================
        function filterCategory(category, element) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentCategory = category;
            currentPage = 1;
            applyFilters();
        }

        function searchSkins() {
            currentPage = 1;
            applyFilters();
        }

        function applyFilters() {
            let searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let rarity = document.getElementById('rarityFilter').value;
            let wear = document.getElementById('wearFilter').value;
            let sort = document.getElementById('sortFilter').value;

            filteredSkins = CS2_SKINS_DB.filter(skin => {
                if (currentCategory !== 'all' && skin.category !== currentCategory) return false;
                if (rarity !== 'all' && skin.rarity !== rarity) return false;
                if (wear !== 'all' && skin.wear !== wear) return false;
                if (searchTerm && !skin.name.toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            filteredSkins.sort((a, b) => {
                let priceA = a.usdPrice || 0;
                let priceB = b.usdPrice || 0;
                switch(sort) {
                    case 'price-desc': return priceB - priceA;
                    case 'price-asc': return priceA - priceB;
                    case 'name-asc': return a.name.localeCompare(b.name);
                    case 'name-desc': return b.name.localeCompare(a.name);
                    default: return 0;
                }
            });

            displaySkins();
        }

        function displaySkins() {
            let start = (currentPage - 1) * itemsPerPage;
            let end = start + itemsPerPage;
            let pageSkins = filteredSkins.slice(start, end);
            
            if (pageSkins.length === 0) {
                document.getElementById('skins-grid').innerHTML = '<div style="text-align:center; padding:50px; color:#888;">😢 Ничего не найдено</div>';
                return;
            }
            
            let html = '';
            pageSkins.forEach(skin => {
                let priceUSD = skin.usdPrice || 100;
                let priceRUB = skin.priceRUB || (priceUSD * USD_TO_RUB);
                let change = ((Math.random() * 6) - 3).toFixed(1);
                
                let rarityColor = '#b0c3d9';
                switch(skin.rarity) {
                    case 'Covert': rarityColor = '#eb4b4b'; break;
                    case 'Classified': rarityColor = '#d32ce6'; break;
                    case 'Restricted': rarityColor = '#8847ff'; break;
                    case 'Contraband': rarityColor = '#ffd700'; break;
                    case 'Extraordinary': rarityColor = '#ff7f50'; break;
                }

                html += `
                    <div class="skin-card" onclick="openSkinModal(${skin.id})">
                        <div class="skin-image">
                            <img src="${skin.image}" alt="${skin.name}" loading="lazy">
                            <div class="skin-rarity" style="border-color: ${rarityColor}; color: ${rarityColor}">${skin.rarity}</div>
                        </div>
                        <div class="skin-info">
                            <div class="skin-name">${skin.name}</div>
                            <div class="skin-price">
                                $${priceUSD.toFixed(2)}
                                <span class="skin-price-rub">≈ ${priceRUB.toLocaleString('ru-RU', {maximumFractionDigits: 0})} ₽</span>
                                <span class="skin-change ${parseFloat(change) >= 0 ? 'positive' : 'negative'}">
                                    ${change}%
                                </span>
                            </div>
                            <div class="skin-float">
                                <span>Float: ${skin.float.toFixed(8)}</span>
                                <span>#${skin.pattern}</span>
                                <span>${skin.wear}</span>
                            </div>
                            <div class="steam-link">
                                <span class="steam-btn">📦 ${skin.collection}</span>
                                <span class="steam-btn">🔄 ${skin.lastUpdate || ''}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('skins-grid').innerHTML = html;
            updatePagination();
        }

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        function openSkinModal(skinId) {
            let skin = CS2_SKINS_DB.find(s => s.id === skinId);
            if (!skin) return;
            
            document.getElementById('modalImage').src = skin.image;
            document.getElementById('modalTitle').textContent = skin.name;
            document.getElementById('modalCollection').textContent = skin.collection || '—';
            document.getElementById('modalDate').textContent = skin.releaseDate ? new Date(skin.releaseDate).toLocaleDateString('ru-RU') : '—';
            document.getElementById('modalRarity').textContent = skin.rarity || '—';
            document.getElementById('modalFloat').textContent = skin.float ? skin.float.toFixed(8) : '—';
            document.getElementById('modalPattern').textContent = skin.pattern || '—';
            document.getElementById('modalWear').textContent = skin.wear || '—';
            document.getElementById('modalDescription').textContent = skin.description || 'Нет описания';
            
            document.getElementById('skinModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('skinModal').style.display = 'none';
        }

        window.onclick = function(event) {
            let modal = document.getElementById('skinModal');
            if (event.target === modal) modal.style.display = 'none';
        }

        function updatePagination() {
            let totalPages = Math.ceil(filteredSkins.length / itemsPerPage);
            if (totalPages <= 1) {
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<div class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</div>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<div class="page-btn">...</div>`;
                }
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            displaySkins();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== ЧАТ ====================
        function fillSkinSelect() {
            let select = document.getElementById('chat-skin-select');
            CS2_SKINS_DB.forEach(skin => {
                let option = document.createElement('option');
                option.value = skin.name;
                option.textContent = skin.name.substring(0, 40);
                select.appendChild(option);
            });
        }

        function sendChatMessage() {
            let text = document.getElementById('chat-input').value.trim();
            let selectedSkin = document.getElementById('chat-skin-select').value;
            
            if (!text || !currentUser) return;

            chatMessages.unshift({
                id: Date.now(),
                username: currentUser,
                text: text,
                skin: selectedSkin,
                time: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString()
            });

            if (chatMessages.length > 200) chatMessages = chatMessages.slice(0, 200);
            
            localStorage.setItem('cs2_market_chat', JSON.stringify(chatMessages));
            document.getElementById('chat-input').value = '';
            displayChatMessages();
            showNotification('💬 Сообщение отправлено');
        }

        function displayChatMessages() {
            let html = '';
            if (chatMessages.length === 0) {
                html = '<div style="text-align:center; padding:40px; color:#888;">💭 Напишите первое сообщение в чат!</div>';
            } else {
                chatMessages.slice(0, 50).forEach(msg => {
                    html += `
                        <div class="chat-message">
                            <div class="chat-message-author">👤 ${escapeHtml(msg.username)}</div>
                            <div class="chat-message-text">${escapeHtml(msg.text)}</div>
                            <div class="chat-message-time">
                                <span>🕒 ${msg.time} ${msg.date}</span>
                                ${msg.skin ? `<span style="color:var(--orange)">🔫 ${escapeHtml(msg.skin)}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('chat-messages').innerHTML = html;
            document.getElementById('chat-messages').scrollTop = 0;
        }

        function escapeHtml(text) {
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateOnlineCount() {
            let online = Math.floor(Math.random() * 500) + 800;
            document.getElementById('online-count').innerHTML = `${online.toLocaleString()} онлайн`;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        window.onload = async function() {
            await updateExchangeRate();
            
            if (currentUser) {
                showMainSite();
            } else {
                showRegister();
            }
            
            generateRealPrices();
            fillSkinSelect();
            displayChatMessages();
            
            setInterval(generateRealPrices, 60000);
            setInterval(updateOnlineCount, 30000);
        };
    </script>
